<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Infosaas® — Studio que pensa junto</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="kit.css">
<style>
  /* Toast for prototype interactions */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--preto); color: var(--branco-off);
    padding: 14px 22px; border-radius: var(--radius-pill);
    font: 500 14px/1 var(--font-sans);
    box-shadow: var(--shadow-lg);
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
  }
  .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Section nav indicator (sticky, top) */
  .route-badge {
    position: fixed; left: 16px; bottom: 16px; z-index: 90;
    background: var(--branco); border: 1px solid var(--cinza-300);
    padding: 8px 12px; border-radius: var(--radius-pill);
    font: 500 11px/1 var(--font-mono); color: var(--fg-muted);
    box-shadow: var(--shadow-sm);
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Components -->
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ProofBar.jsx"></script>
<script type="text/babel" src="ProductGrid.jsx"></script>
<script type="text/babel" src="Manifesto.jsx"></script>
<script type="text/babel" src="Testimonial.jsx"></script>
<script type="text/babel" src="CTASection.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
  const { useState, useCallback } = React;

  function App() {
    const [route, setRoute] = useState("home");
    const [selectedProduct, setSelectedProduct] = useState(null);
    const [toast, setToast] = useState(null);

    const showToast = useCallback((msg) => {
      setToast(msg);
      setTimeout(() => setToast(null), 2200);
    }, []);

    const handleNavigate = (id) => {
      setRoute(id);
      const el = document.getElementById(`section-${id}`);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    };

    const handleCTA = () => showToast("Conversa solicitada — retornamos em até 1 dia útil.");
    const handleProduct = (id) => {
      setSelectedProduct(id);
      showToast(`Produto selecionado · ${id}`);
    };

    return (
      <div className="kit-page" data-screen-label="Infosaas — Studio (home)">
        <Header activeRoute={route} onNavigate={handleNavigate} onCTA={handleCTA} />

        <div id="section-home">
          <Hero onPrimary={handleCTA} onSecondary={() => handleNavigate("produtos")} />
        </div>

        <ProofBar />

        <div id="section-produtos">
          <ProductGrid onSelect={handleProduct} selectedId={selectedProduct} />
        </div>

        <div id="section-manifesto">
          <Manifesto />
        </div>

        <Testimonial />

        <div id="section-cases">
          <CTASection onPrimary={handleCTA} />
        </div>

        <div id="section-studio">
          <Footer />
        </div>

        <div className={`toast ${toast ? "on" : ""}`}>{toast}</div>
        <div className="route-badge">route · {route}</div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
