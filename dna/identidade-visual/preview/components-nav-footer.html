<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Nav & footer</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; background: var(--branco-off); color: var(--preto); }
  .wrap { display:flex; flex-direction:column; gap: 12px; padding: 12px; }

  .nav {
    background: var(--branco); border: 1px solid var(--cinza-300); border-radius: var(--radius-lg);
    padding: 14px 22px; display:flex; align-items:center; justify-content:space-between;
  }
  .nav .lockup img { height: 22px; display:block; }
  .nav .links { display:flex; gap: 22px; font: 500 14px/1 var(--font-sans); color: var(--preto); }
  .nav .links a { color: inherit; text-decoration:none; }
  .nav .links a.active { color: var(--laranja); font-weight: 500; }
  .nav .cta {
    font: 500 13px/1 var(--font-sans); background: var(--laranja); color:#fff;
    border: 0; padding: 10px 16px; border-radius: var(--radius-md); cursor:pointer;
  }

  .foot {
    background: var(--preto); color: var(--branco-off); border-radius: var(--radius-lg);
    padding: 24px; display:grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 20px;
  }
  .foot .brand img { height: 28px; display:block; margin-bottom: 10px; }
  .foot .col h5 { font: 500 11px/1 var(--font-sans); letter-spacing:.12em; text-transform:uppercase; color: rgba(255,255,255,.55); margin: 0 0 10px 0; }
  .foot .col a { display:block; font: 500 13px/1.7 var(--font-sans); color: var(--branco-off); text-decoration:none; }
  .foot .brand p { font: 400 12px/1.5 var(--font-sans); color: rgba(255,255,255,.6); margin: 0; max-width: 26ch; }
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <div class="lockup"><img src="../assets/logos/logo-laranja.svg" alt="infosaas"></div>
    <div class="links">
      <a href="#" class="active">Studio</a>
      <a href="#">Produtos</a>
      <a href="#">Cases</a>
      <a href="#">Manifesto</a>
    </div>
    <button class="cta">Fale com a gente →</button>
  </nav>

  <footer class="foot">
    <div class="brand">
      <img src="../assets/logos/logo-branco.svg" alt="infosaas">
      <p>Um studio que pensa junto com o negócio — do início ao fim.</p>
    </div>
    <div class="col"><h5>Studio</h5><a>Manifesto</a><a>Time</a><a>Carreiras</a></div>
    <div class="col"><h5>Produtos</h5><a>MVP ágil</a><a>Enterprise</a><a>Consultoria</a></div>
    <div class="col"><h5>Contato</h5><a>contato@infosaas.com</a><a>São Paulo, BR</a></div>
  </footer>
</div>
</body>
</html>
