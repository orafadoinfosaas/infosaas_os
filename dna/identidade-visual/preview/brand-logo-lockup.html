<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand · Logo lockup</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; height:100%; background: var(--branco-off); }
  .stage { height: 100vh; display:grid; grid-template-columns: 1fr 1fr; gap:1px; background:var(--cinza-300); }
  .panel { display:flex; align-items:center; justify-content:center; }
  .light  { background: var(--branco); }
  .dark   { background: var(--preto); }
  .panel img { width: 62%; max-width: 360px; display:block; }
  .tag {
    position:absolute; bottom:14px; left:14px;
    font: 500 11px/1 var(--font-sans); letter-spacing: .12em; text-transform:uppercase;
    color: var(--fg-muted);
  }
  .tag-on-dark { color: rgba(255,255,255,.55); }
  .panel { position: relative; }
</style>
</head>
<body>
<div class="stage">
  <div class="panel light">
    <img src="../assets/logos/logo-black.svg" alt="infosaas wordmark, black">
    <span class="tag">logo-black · on F5F5F5</span>
  </div>
  <div class="panel dark">
    <img src="../assets/logos/logo-branco.svg" alt="infosaas wordmark, white">
    <span class="tag tag-on-dark">logo-branco · on 000000</span>
  </div>
</div>
</body>
</html>
