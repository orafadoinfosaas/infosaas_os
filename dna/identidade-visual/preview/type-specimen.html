<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Sora specimen</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; background: var(--branco-off); }
  .wrap { padding: 28px 32px; }
  .label { font: 600 11px/1 var(--font-sans); letter-spacing:.12em; text-transform:uppercase; color: var(--fg-muted); margin-bottom: 6px; }
  .Aa { font: 800 200px/0.9 var(--font-sans); letter-spacing:-0.04em; color: var(--preto); }
  .row { display:flex; align-items:flex-end; gap: 48px; }
  .col-right { flex: 1; padding-bottom: 18px;}
  .name { font: 700 28px/1 var(--font-sans); letter-spacing:-0.02em; }
  .meta { font: 400 14px/1.4 var(--font-sans); color: var(--fg-muted); margin-top: 8px; }
  .weights { font: 400 16px/1 var(--font-sans); color: var(--preto); margin-top: 18px; display:flex; gap: 16px; }
  .weights span { display:inline-flex; gap: 6px; align-items:baseline; }
  .weights b { font-size: 22px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="label">Typeface</div>
  <div class="row">
    <div class="Aa">Aa</div>
    <div class="col-right">
      <div class="name">Sora</div>
      <div class="meta">Google Fonts · used for everything — display, headings, body. JetBrains Mono for code only.</div>
      <div class="weights">
        <span style="font-weight:300">Light <b>300</b></span>
        <span style="font-weight:400">Regular <b>400</b></span>
        <span style="font-weight:500">Medium <b>500</b></span>
        <span style="font-weight:600">SemiBold <b>600</b></span>
        <span style="font-weight:700">Bold <b>700</b></span>
        <span style="font-weight:800">ExtraBold <b>800</b></span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
