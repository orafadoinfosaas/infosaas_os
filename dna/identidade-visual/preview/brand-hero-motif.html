<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand · Hero motif</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; height:100%; background: var(--laranja); color: var(--branco); overflow:hidden; }
  .stage { position:relative; height: 100vh; padding: 28px 36px; box-sizing: border-box; }
  /* Decorative giant símbolo overlay — tonal */
  .glyph {
    position: absolute; right: -8%; top: -10%; width: 65%; opacity: 1;
    filter: brightness(0.78) contrast(1.05);
  }
  .mark { width: 38px; height: 38px; display:block; }
  .head {
    position: absolute; left: 36px; bottom: 28px; right: 36px;
    font: 900 44px/0.95 var(--font-sans); letter-spacing: -0.02em;
    color: #ffffff;
    text-wrap: balance;
  }
  .head span { display:block; }
</style>
</head>
<body>
<div class="stage">
  <img class="mark" src="../assets/logos/simbolo-branco.svg" alt="">
  <img class="glyph" src="../assets/logos/simbolo-laranja.svg" alt="">
  <h1 class="head">
    <span>Nova fase.</span>
    <span>Novos desafios.</span>
    <span>A mesma essência.</span>
  </h1>
</div>
</body>
</html>
