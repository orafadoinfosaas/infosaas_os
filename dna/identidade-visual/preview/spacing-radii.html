<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing · Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; background: var(--branco-off); color: var(--preto); }
  .wrap { padding: 18px 28px; }
  .row { display:grid; grid-template-columns: repeat(6, 1fr); gap: 16px; align-items:end; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .swatch { width: 80px; height: 80px; background: var(--laranja); }
  .name { font: 700 12px/1 var(--font-mono); color: var(--preto); }
  .px   { font: 500 11px/1 var(--font-mono); color: var(--fg-muted); }
  .r-sm  { border-radius: 6px; }
  .r     { border-radius: 12px; }
  .r-md  { border-radius: 18px; }
  .r-lg  { border-radius: 24px; }
  .r-xl  { border-radius: 32px; }
  .r-pill{ border-radius: 999px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="item"><div class="swatch r-sm"></div><div class="name">--radius-sm</div><div class="px">6 px</div></div>
    <div class="item"><div class="swatch r"></div><div class="name">--radius</div><div class="px">12 px</div></div>
    <div class="item"><div class="swatch r-md"></div><div class="name">--radius-md</div><div class="px">18 px</div></div>
    <div class="item"><div class="swatch r-lg"></div><div class="name">--radius-lg</div><div class="px">24 px</div></div>
    <div class="item"><div class="swatch r-xl"></div><div class="name">--radius-xl</div><div class="px">32 px</div></div>
    <div class="item"><div class="swatch r-pill"></div><div class="name">--radius-pill</div><div class="px">999</div></div>
  </div>
</div>
</body>
</html>
